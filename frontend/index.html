<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD — Gestão de Produtos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --accent-glow: rgba(124, 58, 237, 0.3);
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Syne", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .logo-text h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e2e8f0, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text span {
      font-size: 12px;
      color: var(--muted);
      font-family: "DM Mono", monospace;
      letter-spacing: 1px;
    }

    .header-stats {
      display: flex;
      gap: 24px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent2);
      font-family: "DM Mono", monospace;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* TOAST */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
      max-width: 320px;
    }

    .toast.error { border-left-color: var(--red); }
    .toast.warning { border-left-color: var(--yellow); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(100%); }
    }

    /* MAIN LAYOUT */
    .main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 28px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .dot {
      width: 6px;
      height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent2);
    }

    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: "DM Mono", monospace;
    }

    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: "Syne", sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea { resize: vertical; min-height: 80px; }

    select option { background: var(--surface2); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 8px;
      font-family: "Syne", sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      width: 100%;
      justify-content: center;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(124,58,237,0.5);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--accent); }

    .btn-icon {
      width: 34px;
      height: 34px;
      padding: 0;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
    }

    .btn-edit { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
    .btn-edit:hover { background: rgba(245,158,11,0.25); }
    .btn-delete { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-delete:hover { background: rgba(239,68,68,0.25); }

    /* SEARCH & FILTER */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap input {
      padding-left: 40px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar select {
      width: 160px;
      flex-shrink: 0;
    }

    /* TABLE */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface2);
    }

    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-family: "DM Mono", monospace;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid rgba(42,42,61,0.5);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(124,58,237,0.04); }

    .nome-cell { font-weight: 600; }
    .preco-cell { font-family: "DM Mono", monospace; color: var(--green); font-weight: 500; }
    .estoque-cell { font-family: "DM Mono", monospace; color: var(--accent2); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-eletronicos { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .badge-roupas { background: rgba(236,72,153,0.15); color: #f472b6; border: 1px solid rgba(236,72,153,0.3); }
    .badge-alimentos { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .badge-livros { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .badge-outros { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }

    .actions-cell { display: flex; gap: 6px; }

    /* EMPTY / LOADING */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 12px;
      color: var(--muted);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-info {
      font-size: 13px;
      color: var(--muted);
      font-family: "DM Mono", monospace;
    }

    .page-btns { display: flex; gap: 6px; }

    .page-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: "DM Mono", monospace;
      color: var(--muted);
      transition: all 0.2s;
    }

    .page-btn:hover, .page-btn.active {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(124,58,237,0.1);
    }

    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* STATUS dot */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.inactive { background: var(--muted); }

    /* Editing mode highlight */
    .card.editing::before {
      background: linear-gradient(90deg, var(--yellow), #f97316, transparent);
    }

    .editing-badge {
      display: none;
      font-size: 11px;
      background: rgba(245,158,11,0.15);
      color: var(--yellow);
      border: 1px solid rgba(245,158,11,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      font-family: "DM Mono", monospace;
      letter-spacing: 1px;
    }

    .card.editing .editing-badge { display: inline-flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>

<div id="toast-container"></div>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">📦</div>
        <div class="logo-text">
          <h1>ProdutoBase</h1>
          <span>MongoDB + Mongoose CRUD</span>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat">
          <div class="stat-value" id="total-count">–</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="active-count">–</div>
          <div class="stat-label">Ativos</div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container" style="padding-bottom: 60px;">
  <div class="main-grid">

    <!-- FORM -->
    <div class="card" id="form-card">
      <div class="card-title">
        <span class="dot"></span>
        <span id="form-title">Novo Produto</span>
        <div class="editing-badge">✏️ EDITANDO</div>
      </div>

      <div class="form-group">
        <label>Nome do Produto *</label>
        <input type="text" id="nome" placeholder="Ex: iPhone 15 Pro" maxlength="100" />
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea id="descricao" placeholder="Descreva o produto..." maxlength="500"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Preço (R$) *</label>
          <input type="number" id="preco" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Estoque</label>
          <input type="number" id="estoque" placeholder="0" min="0" value="0" />
        </div>
      </div>

      <div class="form-group">
        <label>Categoria *</label>
        <select id="categoria">
          <option value="">Selecione...</option>
          <option value="Eletrônicos">Eletrônicos</option>
          <option value="Roupas">Roupas</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Livros">Livros</option>
          <option value="Outros">Outros</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="ativo">
          <option value="true">✅ Ativo</option>
          <option value="false">❌ Inativo</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="salvarProduto()">
        <span id="btn-icon">＋</span>
        <span id="btn-text">Criar Produto</span>
      </button>
      <button class="btn btn-secondary" id="btn-cancel" onclick="cancelarEdicao()" style="display:none;">
        ✕ Cancelar Edição
      </button>
    </div>

    <!-- LIST -->
    <div>
      <div class="card" style="margin-bottom: 0; border-radius: 16px 16px 0 0;">
        <div class="card-title">
          <span class="dot"></span>
          Produtos Cadastrados
        </div>
        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Buscar produtos..." oninput="debounceSearch()" />
          </div>
          <select id="filter-categoria" onchange="carregarProdutos()">
            <option value="">Todas categorias</option>
            <option value="Eletrônicos">Eletrônicos</option>
            <option value="Roupas">Roupas</option>
            <option value="Alimentos">Alimentos</option>
            <option value="Livros">Livros</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-body">
            <tr>
              <td colspan="6">
                <div class="loading">
                  <div class="spinner"></div>
                  Carregando...
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <span class="page-info" id="page-info">–</span>
        <div class="page-btns" id="page-btns"></div>
      </div>
    </div>

  </div>
</div>

<script>
  const API = "http://localhost:3000/api/produtos";
  let editId = null;
  let currentPage = 1;
  let searchTimer = null;

  // ───── TOAST ─────
  function toast(msg, type = "success") {
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById("toast-container").appendChild(el);
    setTimeout(() => el.remove(), 3100);
  }

  // ───── DEBOUNCE SEARCH ─────
  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; carregarProdutos(); }, 400);
  }

  // ───── LOAD ─────
  async function carregarProdutos() {
    const tbody = document.getElementById("tabela-body");
    tbody.innerHTML = `<tr><td colspan="6"><div class="loading"><div class="spinner"></div>Carregando...</div></td></tr>`;

    const search = document.getElementById("search").value;
    const categoria = document.getElementById("filter-categoria").value;
    const params = new URLSearchParams({ page: currentPage, limit: 8 });
    if (search) params.set("search", search);
    if (categoria) params.set("categoria", categoria);

    try {
      const res = await fetch(`${API}?${params}`);
      const json = await res.json();

      if (!json.success) throw new Error(json.message);

      const { data, pagination } = json;

      document.getElementById("total-count").textContent = pagination.total;
      document.getElementById("active-count").textContent = data.filter(p => p.ativo).length;

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div><p>Nenhum produto encontrado</p></div></td></tr>`;
        renderPagination(pagination);
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr>
          <td class="nome-cell">${escHtml(p.nome)}</td>
          <td><span class="badge badge-${p.categoria.toLowerCase().normalize('NFD').replace(/[^a-z]/g,'')}">${escHtml(p.categoria)}</span></td>
          <td class="preco-cell">R$ ${Number(p.preco).toFixed(2)}</td>
          <td class="estoque-cell">${p.estoque}</td>
          <td><span class="status-dot ${p.ativo ? 'active' : 'inactive'}"></span>${p.ativo ? 'Ativo' : 'Inativo'}</td>
          <td class="actions-cell">
            <button class="btn btn-icon btn-edit" onclick="editarProduto('${p._id}')" title="Editar">✏️</button>
            <button class="btn btn-icon btn-delete" onclick="deletarProduto('${p._id}', '${escHtml(p.nome)}')" title="Excluir">🗑️</button>
          </td>
        </tr>
      `).join("");

      renderPagination(pagination);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⚠️</div><p>Erro ao carregar: ${err.message}</p></div></td></tr>`;
      toast("Erro ao conectar com a API. Verifique se o servidor está rodando.", "error");
    }
  }

  // ───── PAGINATION ─────
  function renderPagination({ total, page, pages }) {
    document.getElementById("page-info").textContent = `${total} produto(s) — página ${page} de ${pages}`;
    const container = document.getElementById("page-btns");
    container.innerHTML = "";

    const prev = document.createElement("button");
    prev.className = "page-btn";
    prev.textContent = "←";
    prev.disabled = page <= 1;
    prev.onclick = () => { currentPage--; carregarProdutos(); };
    container.appendChild(prev);

    for (let i = 1; i <= pages; i++) {
      if (pages > 7 && i > 2 && i < pages - 1 && Math.abs(i - page) > 1) continue;
      const btn = document.createElement("button");
      btn.className = "page-btn" + (i === page ? " active" : "");
      btn.textContent = i;
      btn.onclick = () => { currentPage = i; carregarProdutos(); };
      container.appendChild(btn);
    }

    const next = document.createElement("button");
    next.className = "page-btn";
    next.textContent = "→";
    next.disabled = page >= pages;
    next.onclick = () => { currentPage++; carregarProdutos(); };
    container.appendChild(next);
  }

  // ───── SAVE (CREATE / UPDATE) ─────
  async function salvarProduto() {
    const body = {
      nome: document.getElementById("nome").value.trim(),
      descricao: document.getElementById("descricao").value.trim(),
      preco: parseFloat(document.getElementById("preco").value),
      estoque: parseInt(document.getElementById("estoque").value) || 0,
      categoria: document.getElementById("categoria").value,
      ativo: document.getElementById("ativo").value === "true",
    };

    if (!body.nome || !body.categoria || isNaN(body.preco)) {
      toast("Preencha os campos obrigatórios: nome, preço e categoria.", "error");
      return;
    }

    const url = editId ? `${API}/${editId}` : API;
    const method = editId ? "PUT" : "POST";

    try {
      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      toast(json.message);
      limparForm();
      carregarProdutos();
    } catch (err) {
      toast(err.message, "error");
    }
  }

  // ───── EDIT ─────
  async function editarProduto(id) {
    try {
      const res = await fetch(`${API}/${id}`);
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      const p = json.data;
      editId = id;

      document.getElementById("nome").value = p.nome;
      document.getElementById("descricao").value = p.descricao || "";
      document.getElementById("preco").value = p.preco;
      document.getElementById("estoque").value = p.estoque;
      document.getElementById("categoria").value = p.categoria;
      document.getElementById("ativo").value = String(p.ativo);

      document.getElementById("form-title").textContent = "Editar Produto";
      document.getElementById("btn-text").textContent = "Salvar Alterações";
      document.getElementById("btn-icon").textContent = "✓";
      document.getElementById("btn-cancel").style.display = "flex";
      document.getElementById("form-card").classList.add("editing");
      document.getElementById("nome").focus();

      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (err) {
      toast(err.message, "error");
    }
  }

  // ───── DELETE ─────
  async function deletarProduto(id, nome) {
    if (!confirm(`Tem certeza que deseja excluir "${nome}"?`)) return;

    try {
      const res = await fetch(`${API}/${id}`, { method: "DELETE" });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      toast(json.message);
      carregarProdutos();
    } catch (err) {
      toast(err.message, "error");
    }
  }

  // ───── CANCEL EDIT ─────
  function cancelarEdicao() {
    limparForm();
  }

  function limparForm() {
    editId = null;
    ["nome", "descricao", "preco", "estoque"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("categoria").value = "";
    document.getElementById("ativo").value = "true";
    document.getElementById("estoque").value = "0";
    document.getElementById("form-title").textContent = "Novo Produto";
    document.getElementById("btn-text").textContent = "Criar Produto";
    document.getElementById("btn-icon").textContent = "＋";
    document.getElementById("btn-cancel").style.display = "none";
    document.getElementById("form-card").classList.remove("editing");
  }

  // ───── UTILS ─────
  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ───── INIT ─────
  carregarProdutos();
</script>
</body>
</html>
